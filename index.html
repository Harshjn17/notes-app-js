<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">

  <h1>My Notes</h1>

  <!-- Form -->
  <div class="form" id="form">
    <input type="text" id="title" placeholder="Note Title">
    <textarea id="note" placeholder="Write your note..."></textarea>
    <button id="addBtn">Add Note</button>
  </div>

  <!-- Notes Container -->
  <div id="notesContainer" class="notes-container"></div>

</div>

<!-- Floating Button -->
<div class="classicAdd">
  <button id="addMark">+</button>
</div>
  <script src="script.js"></script>
</body>
</html>
